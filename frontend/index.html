<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#16a34a" />
  <title>GreenConnect — Hệ sinh thái rác thải tuần hoàn</title>

  <!-- 1. TỐI ƯU TỐC ĐỘ TẢI FONT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- 2. THÊM GOOGLE FONTS (Plus Jakarta Sans & Be Vietnam Pro) -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800;900&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <!-- 3. THÊM MATERIAL SYMBOLS (ICON) -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <!-- 4. THÊM TAILWIND CSS (Để giao diện mới hiển thị đúng) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    /* Cập nhật font chữ mặc định cho toàn bộ trang */
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: #f5fced;
    }
    #root { min-height: 100vh; }

    /* Cấu hình cho Icon hiển thị chuẩn */
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
</head>
<body>
<noscript>Vui lòng bật JavaScript để sử dụng ứng dụng.</noscript>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
