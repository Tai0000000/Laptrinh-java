spring.application.name=waste-management

# spring.datasource.url=jdbc:mysql://localhost:3306/waste_management_db?useSSL=false&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password= 

# Kết nối H2 (In-memory) để chạy thử khi không có MySQL
spring.datasource.url=jdbc:h2:mem:waste_db;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Cấu hình Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Gemini API Configuration
gemini.api.key=YOUR_GEMINI_API_KEY